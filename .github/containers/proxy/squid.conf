# ──────────────────────────────────────────────────────────
# Squid proxy for agent network isolation
#
# Domain allowlist is injected at runtime via:
#   /etc/squid/allowed-domains.txt
#
# This file is generated from the workflow YAML by the
# run-sandboxed-agent.sh script. All domain policy lives
# in the workflow, not here.
# ──────────────────────────────────────────────────────────

# Domain allowlist (injected at container start)
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"

# Port safety
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow only allowlisted domains
http_access allow allowed_domains

# Deny everything else
http_access deny all

http_port 3128

# Audit log - every request the agent makes is recorded
access_log stdio:/var/log/squid/access.log
cache_log stdio:/var/log/squid/cache.log
cache deny all
