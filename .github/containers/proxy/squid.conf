# ──────────────────────────────────────────────────────────
# Squid proxy for agent network isolation
#
# Only domains in this allowlist are reachable from the agent
# container. Everything else is denied.
# ──────────────────────────────────────────────────────────

# ACL: allowed domains for the cluster-doctor agent
acl allowed_domains dstdomain api.githubcopilot.com
acl allowed_domains dstdomain api.github.com
acl allowed_domains dstdomain .azmk8s.io
acl allowed_domains dstdomain login.microsoftonline.com
acl allowed_domains dstdomain management.azure.com

# Read additional allowed domains from file (injected at runtime)
acl dynamic_domains dstdomain "/etc/squid/dynamic-domains.txt"

# SSL bump: allow CONNECT method for HTTPS
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Deny non-safe ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow traffic to allowlisted domains only
http_access allow allowed_domains
http_access allow dynamic_domains

# Deny everything else
http_access deny all

# Proxy listens on 3128
http_port 3128

# Logging (useful for debugging, can be disabled in production)
access_log stdio:/var/log/squid/access.log
cache_log stdio:/var/log/squid/cache.log

# No caching needed
cache deny all
