name: "Cluster Doctor (Safe Outputs)"

# Three-phase pattern:
#   1. Diagnose - Agent explores cluster freely (read-only K8s + GitHub MCP)
#   2. Scan     - Validate constraints, sanitize secrets, AI threat detection
#   3. Apply    - Deterministic write to GitHub (issues, PRs)
#
# Each job has exactly one concern and the minimum permissions for it.
#
# See: https://github.com/microsoftgbb/safe-outputs-action

on:
  workflow_dispatch:
  repository_dispatch:
    types: [cluster-doctor-trigger]
  issues:
    types: [labeled, opened]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Diagnose
  #
  # Has: Azure OIDC (read-only), K8s MCP (read-only), GitHub MCP (read-only)
  # Does NOT have: GitHub write token
  #
  # The agent can freely explore the cluster - check pod logs,
  # inspect HPA config, trace dependency chains, etc.
  # Produces a structured safe-outputs JSON artifact.
  # ──────────────────────────────────────────────────────────
  diagnose:
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event_name == 'repository_dispatch' ||
      github.event.label.name == 'cluster-doctor' ||
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'cluster-doctor'))
    environment: copilot
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # Azure OIDC (scoped to read-only role)
      contents: read
      issues: read
    outputs:
      issue_number: ${{ steps.get-issue.outputs.issue_number }}

    steps:
      - name: Determine issue number
        id: get-issue
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "issue_number=${{ github.event.client_payload.issue_number }}" >> $GITHUB_OUTPUT
          else
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install GitHub Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash

      - name: Parse cluster info from issue body
        id: cluster-info
        env:
          GITHUB_MCP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          export ISSUE_NUMBER="${{ steps.get-issue.outputs.issue_number }}"
          export REPOSITORY="${{ github.repository }}"
          PROMPT=$(envsubst < .github/prompts/parse-cluster-info.md)

          COPILOT_OUTPUT=$(copilot -p "$PROMPT" \
            --agent "cluster-doctor" \
            --additional-mcp-config @'.copilot/mcp-config.json' \
            --allow-all-tools 2>&1)

          RESOURCE_GROUP=$(echo "$COPILOT_OUTPUT" | grep -oP 'RESOURCE_GROUP=\K[^\s]+' | head -1)
          CLUSTER_NAME=$(echo "$COPILOT_OUTPUT" | grep -oP 'CLUSTER_NAME=\K[^\s]+' | head -1)

          if [ -z "$RESOURCE_GROUP" ] || [ -z "$CLUSTER_NAME" ]; then
            echo "ERROR: Could not parse cluster info"
            echo "$COPILOT_OUTPUT"
            exit 1
          fi

          echo "RESOURCE_GROUP=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> $GITHUB_OUTPUT

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Connect to AKS cluster
        run: |
          az aks install-cli
          az aks get-credentials \
            --resource-group ${{ steps.cluster-info.outputs.RESOURCE_GROUP }} \
            --name ${{ steps.cluster-info.outputs.CLUSTER_NAME }} \
            --overwrite-existing
          kubectl cluster-info
          kubectl port-forward -n aks-mcp svc/aks-mcp 8000:8000 &
          sleep 3

      # ── Agent explores the cluster freely ──
      #
      # CAN: query K8s resources, read pod logs, check events, read issue context
      # CANNOT: write to GitHub, mutate K8s, access K8s secrets, reach external networks
      #
      # Recommended K8s ClusterRole for the AKS MCP service account:
      #   pods, events, nodes, services, namespaces: get, list
      #   pods/log: get
      #   deployments, replicasets, daemonsets, statefulsets: get, list
      #   horizontalpodautoscalers: get, list
      #   NO secrets, NO configmaps (or namespace-scoped), NO write verbs

      - name: AI diagnosis
        env:
          GITHUB_MCP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.get-issue.outputs.issue_number }}"
          CLUSTER_NAME="${{ steps.cluster-info.outputs.CLUSTER_NAME }}"
          RG="${{ steps.cluster-info.outputs.RESOURCE_GROUP }}"

          export PROMPT="You are the Cluster Doctor diagnosing AKS cluster '${CLUSTER_NAME}' in resource group '${RG}'.

          Use the AKS MCP server to explore the cluster. You have read-only access to all Kubernetes resources.
          Use the GitHub MCP server to read issue #${ISSUE_NUMBER} in ${{ github.repository }} for context.

          INVESTIGATE FREELY:
          - Start broad (cluster health, node status, pod states)
          - Follow threads when you find issues (e.g., OOMKilled -> check resource limits -> check HPA -> check node capacity)
          - Check pod logs for crash details
          - Trace the dependency chain (service -> deployment -> pods -> events)
          - Look at recent events for warning patterns

          When your investigation is complete, produce your findings as a JSON file at agent-output.json following this schema:

          {
            \"version\": \"1\",
            \"actions\": [
              {
                \"type\": \"issue_comment\",
                \"issue_number\": ${ISSUE_NUMBER},
                \"body\": \"## Cluster Doctor Report\n\n<your full analysis in markdown including investigation path, findings with evidence, root cause, and remediation steps>\"
              }
            ]
          }

          If you identify config/code changes that would fix the issue, add a create_pull_request action:
          {
            \"type\": \"create_pull_request\",
            \"title\": \"[cluster-doctor] <description>\",
            \"body\": \"<what changed and why>\",
            \"head\": \"cluster-doctor/fix-<issue>\",
            \"files\": { \"path/to/file\": \"full file content\" }
          }

          RULES:
          - Write ONLY the agent-output.json file
          - Do NOT include secrets, tokens, connection strings, or internal IPs in your output
          - Use [cluster-doctor] prefix on all titles"

          copilot -p "$PROMPT" \
            --agent "cluster-doctor" \
            --additional-mcp-config @'.copilot/mcp-config.json' \
            --allow-all-tools

          if [ ! -f agent-output.json ]; then
            echo "ERROR: Agent did not produce agent-output.json"
            exit 1
          fi
          python3 -c "import json; json.load(open('agent-output.json'))" || {
            echo "ERROR: agent-output.json is not valid JSON"
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: agent-output
          path: agent-output.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # Job 2: Scan
  #
  # Has: nothing - no cloud creds, no write tokens, no cluster access
  # Just the agent's output artifact and the safe-outputs validator.
  #
  # Validates constraints, sanitizes secrets, runs AI threat detection.
  # If anything fails, the workflow stops here - nothing gets written.
  # ──────────────────────────────────────────────────────────
  scan:
    needs: diagnose
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agent-output

      - name: Install Copilot CLI (for threat detection)
        run: |
          curl -fsSL https://gh.io/copilot-install | bash

      - name: Validate, sanitize, and scan
        uses: microsoftgbb/safe-outputs-action@v1
        with:
          artifact-path: agent-output.json
          max-issues: 0
          max-comments: 2
          max-pull-requests: 1
          title-prefix: "[cluster-doctor] "
          allowed-labels: "cluster-doctor,bug,investigation,remediation"
          threat-detection: true
          dry-run: true
          custom-secret-patterns: |
            10\.0\.\d+\.\d+
            aks-[a-z0-9]{8,}
            DefaultEndpointsProtocol
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}

      # Re-upload the (potentially sanitized) output for the apply job
      - uses: actions/upload-artifact@v4
        with:
          name: scanned-output
          path: agent-output.json
          retention-days: 1
          overwrite: true

  # ──────────────────────────────────────────────────────────
  # Job 3: Apply
  #
  # Has: GitHub write token (issues, contents, pull-requests)
  # Does NOT have: AI agent, cloud creds, cluster access
  #
  # Mechanically applies the validated, sanitized output.
  # No decisions made here - just execution.
  # ──────────────────────────────────────────────────────────
  apply:
    needs: [diagnose, scan]
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: scanned-output

      - name: Apply safe outputs
        uses: microsoftgbb/safe-outputs-action@v1
        with:
          artifact-path: agent-output.json
          max-issues: 0
          max-comments: 2
          max-pull-requests: 1
          title-prefix: "[cluster-doctor] "
          allowed-labels: "cluster-doctor,bug,investigation,remediation"
