name: "Cluster Doctor (Safe Outputs)"

# Three-phase pattern with network-isolated agent:
#   1. Diagnose - Agent in container, all traffic through allowlisted proxy
#   2. Scan     - Validate constraints, sanitize secrets, AI threat detection
#   3. Apply    - Deterministic write to GitHub (issues, PRs)
#
# Defense-in-depth layers:
#   - Container isolation (agent runs in Docker, not on bare runner)
#   - Network firewall (Squid proxy with domain allowlist)
#   - Scoped credentials (read-only K8s RBAC, read-only Azure)
#   - Safe outputs (constraint validation, secret sanitization, threat detection)
#   - Permission separation (three jobs, three permission sets)
#
# See: https://github.com/microsoftgbb/safe-outputs-action

on:
  workflow_dispatch:
  repository_dispatch:
    types: [cluster-doctor-trigger]
  issues:
    types: [labeled, opened]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Diagnose
  #
  # Setup runs on the bare runner (Azure login, kubeconfig).
  # Agent runs inside an isolated Docker container where all
  # network traffic is routed through a Squid proxy enforcing
  # a domain allowlist. The proxy log provides a full audit
  # trail of every domain the agent contacted.
  #
  # Allowed domains:
  #   - api.githubcopilot.com (model API)
  #   - api.github.com (GitHub MCP, read-only)
  #   - *.azmk8s.io (K8s API server, for port-forward)
  #   - login.microsoftonline.com (Azure AD token exchange)
  #   - management.azure.com (Azure ARM, read-only)
  #   - <cluster-specific FQDN> (injected dynamically)
  #
  # Everything else is blocked at the network level.
  # ──────────────────────────────────────────────────────────
  diagnose:
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event_name == 'repository_dispatch' ||
      github.event.label.name == 'cluster-doctor' ||
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'cluster-doctor'))
    environment: copilot
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # Azure OIDC (scoped to read-only roles)
      contents: read
      issues: read
    outputs:
      issue_number: ${{ steps.get-issue.outputs.issue_number }}

    steps:
      - name: Determine issue number
        id: get-issue
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "issue_number=${{ github.event.client_payload.issue_number }}" >> $GITHUB_OUTPUT
          else
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install GitHub Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash

      # ── Parse cluster info (runs on host, needs Copilot CLI) ──
      - name: Parse cluster info from issue body
        id: cluster-info
        env:
          GITHUB_MCP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          export ISSUE_NUMBER="${{ steps.get-issue.outputs.issue_number }}"
          export REPOSITORY="${{ github.repository }}"
          PROMPT=$(envsubst < .github/prompts/parse-cluster-info.md)

          COPILOT_OUTPUT=$(copilot -p "$PROMPT" \
            --agent "cluster-doctor" \
            --additional-mcp-config @'.copilot/mcp-config.json' \
            --allow-all-tools 2>&1)

          RESOURCE_GROUP=$(echo "$COPILOT_OUTPUT" | grep -oP 'RESOURCE_GROUP=\K[^\s]+' | head -1)
          CLUSTER_NAME=$(echo "$COPILOT_OUTPUT" | grep -oP 'CLUSTER_NAME=\K[^\s]+' | head -1)

          if [ -z "$RESOURCE_GROUP" ] || [ -z "$CLUSTER_NAME" ]; then
            echo "ERROR: Could not parse cluster info"
            echo "$COPILOT_OUTPUT"
            exit 1
          fi

          echo "RESOURCE_GROUP=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> $GITHUB_OUTPUT

      # ── Setup cluster access (runs on host) ──
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Get AKS credentials and API server FQDN
        id: aks
        run: |
          az aks install-cli
          az aks get-credentials \
            --resource-group ${{ steps.cluster-info.outputs.RESOURCE_GROUP }} \
            --name ${{ steps.cluster-info.outputs.CLUSTER_NAME }} \
            --overwrite-existing

          # Extract the API server FQDN for the proxy allowlist
          API_SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' | sed 's|https://||' | cut -d: -f1)
          echo "api_server=$API_SERVER" >> $GITHUB_OUTPUT
          echo "Cluster API server: $API_SERVER"

      - name: Post work started comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.get-issue.outputs.issue_number }} \
            --body "🤖 **Cluster Doctor is on the case!**

          Connected to cluster. AI diagnosis starting in a sandboxed environment
          with network-restricted access.

          🔗 [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      # ── Generate agent prompt ──
      - name: Generate diagnosis prompt
        run: |
          ISSUE_NUMBER="${{ steps.get-issue.outputs.issue_number }}"
          CLUSTER_NAME="${{ steps.cluster-info.outputs.CLUSTER_NAME }}"
          RG="${{ steps.cluster-info.outputs.RESOURCE_GROUP }}"

          cat > /tmp/diagnosis-prompt.md << PROMPT
          You are the Cluster Doctor diagnosing AKS cluster "${CLUSTER_NAME}" in resource group "${RG}".

          Use the AKS MCP server to explore the cluster. You have read-only access to Kubernetes resources.
          Use the GitHub MCP server to read issue #${ISSUE_NUMBER} in ${{ github.repository }} for context.

          INVESTIGATE FREELY:
          - Start broad (cluster health, node status, pod states)
          - Follow threads when you find issues (OOMKilled -> resource limits -> HPA -> node capacity)
          - Check pod logs for crash details
          - Trace dependency chains (service -> deployment -> pods -> events)
          - Look at recent events for warning patterns

          Produce your findings as a JSON file at agent-output.json:

          {
            "version": "1",
            "actions": [
              {
                "type": "issue_comment",
                "issue_number": ${ISSUE_NUMBER},
                "body": "## Cluster Doctor Report\n\n<markdown with investigation path, findings, root cause, remediation>"
              }
            ]
          }

          For config/code fixes, add a create_pull_request action:
          {
            "type": "create_pull_request",
            "title": "[cluster-doctor] <description>",
            "body": "<what and why>",
            "head": "cluster-doctor/fix-<issue>",
            "files": { "path/to/file": "content" }
          }

          RULES:
          - Write ONLY agent-output.json
          - Do NOT include secrets, tokens, connection strings, or internal IPs
          - Use [cluster-doctor] prefix on all titles
          PROMPT

      # ── Run agent in sandboxed container ──
      - name: Run sandboxed agent
        env:
          COPILOT_CLI_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
          GITHUB_MCP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .github/scripts/run-sandboxed-agent.sh \
            --kubeconfig "$HOME/.kube/config" \
            --cluster-api-server "${{ steps.aks.outputs.api_server }}" \
            --prompt-file /tmp/diagnosis-prompt.md \
            --output-file "$GITHUB_WORKSPACE/agent-output.json" \
            --mcp-config ".copilot/mcp-config.json" \
            --copilot-token "$COPILOT_CLI_TOKEN" \
            --github-mcp-token "$GITHUB_MCP_TOKEN"

      - uses: actions/upload-artifact@v4
        with:
          name: agent-output
          path: agent-output.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # Job 2: Scan
  #
  # No credentials. No cluster access. No write tokens.
  # Pure validation: constraints, secret sanitization, AI threat scan.
  # Acts as a circuit breaker between diagnosis and action.
  # ──────────────────────────────────────────────────────────
  scan:
    needs: diagnose
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agent-output

      - name: Install Copilot CLI (for threat detection)
        run: |
          curl -fsSL https://gh.io/copilot-install | bash

      - name: Validate, sanitize, and scan
        uses: microsoftgbb/safe-outputs-action@v1
        with:
          artifact-path: agent-output.json
          max-issues: 0
          max-comments: 2
          max-pull-requests: 1
          title-prefix: "[cluster-doctor] "
          allowed-labels: "cluster-doctor,bug,investigation,remediation"
          threat-detection: true
          dry-run: true
          custom-secret-patterns: |
            10\.0\.\d+\.\d+
            aks-[a-z0-9]{8,}
            DefaultEndpointsProtocol
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: scanned-output
          path: agent-output.json
          retention-days: 1
          overwrite: true

  # ──────────────────────────────────────────────────────────
  # Job 3: Apply
  #
  # GitHub write token only. No agent. No cluster creds.
  # Mechanically applies validated, sanitized output.
  # ──────────────────────────────────────────────────────────
  apply:
    needs: [diagnose, scan]
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: scanned-output

      - name: Apply safe outputs
        uses: microsoftgbb/safe-outputs-action@v1
        with:
          artifact-path: agent-output.json
          max-issues: 0
          max-comments: 2
          max-pull-requests: 1
          title-prefix: "[cluster-doctor] "
          allowed-labels: "cluster-doctor,bug,investigation,remediation"
