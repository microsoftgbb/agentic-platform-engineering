name: "Cluster Doctor (Safe Outputs)"

# Refactored to use the three-phase pattern:
#   1. Parse & Gather (has cloud creds, no AI write access)
#   2. Analyze (AI agent with read-only access, produces safe-outputs JSON)
#   3. Apply (deterministic, validates + sanitizes + applies via safe-outputs-action)
#
# See: https://github.com/microsoftgbb/safe-outputs-action

on:
  workflow_dispatch:
  repository_dispatch:
    types: [cluster-doctor-trigger]
  issues:
    types: [labeled, opened]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # Phase 1: Parse issue + gather cluster diagnostics
  # Has cloud credentials but NO AI agent running here.
  # ──────────────────────────────────────────────────────────
  gather:
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event_name == 'repository_dispatch' ||
      github.event.label.name == 'cluster-doctor' ||
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'cluster-doctor'))
    environment: copilot
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # Azure OIDC
      contents: read
      issues: read
    outputs:
      issue_number: ${{ steps.get-issue.outputs.issue_number }}
      resource_group: ${{ steps.cluster-info.outputs.RESOURCE_GROUP }}
      cluster_name: ${{ steps.cluster-info.outputs.CLUSTER_NAME }}

    steps:
      - name: Determine issue number
        id: get-issue
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "issue_number=${{ github.event.client_payload.issue_number }}" >> $GITHUB_OUTPUT
          else
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install GitHub Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash

      - name: Parse cluster info from issue body
        id: cluster-info
        env:
          GITHUB_MCP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          export ISSUE_NUMBER="${{ steps.get-issue.outputs.issue_number }}"
          export REPOSITORY="${{ github.repository }}"
          PROMPT=$(envsubst < .github/prompts/parse-cluster-info.md)

          COPILOT_OUTPUT=$(copilot -p "$PROMPT" \
            --agent "cluster-doctor" \
            --additional-mcp-config @'.copilot/mcp-config.json' \
            --allow-all-tools 2>&1)

          RESOURCE_GROUP=$(echo "$COPILOT_OUTPUT" | grep -oP 'RESOURCE_GROUP=\K[^\s]+' | head -1)
          CLUSTER_NAME=$(echo "$COPILOT_OUTPUT" | grep -oP 'CLUSTER_NAME=\K[^\s]+' | head -1)

          if [ -z "$RESOURCE_GROUP" ] || [ -z "$CLUSTER_NAME" ]; then
            echo "ERROR: Could not parse cluster info"
            echo "$COPILOT_OUTPUT"
            exit 1
          fi

          echo "RESOURCE_GROUP=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> $GITHUB_OUTPUT

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks install-cli
          az aks get-credentials \
            --resource-group ${{ steps.cluster-info.outputs.RESOURCE_GROUP }} \
            --name ${{ steps.cluster-info.outputs.CLUSTER_NAME }} \
            --overwrite-existing

      - name: Gather cluster diagnostics
        run: |
          mkdir -p diagnostics
          kubectl get events -A -o json > diagnostics/events.json
          kubectl get pods -A -o json > diagnostics/pods.json
          kubectl get nodes -o json > diagnostics/nodes.json
          kubectl top nodes --no-headers > diagnostics/node-metrics.txt 2>/dev/null || true
          kubectl top pods -A --no-headers > diagnostics/pod-metrics.txt 2>/dev/null || true
          kubectl get hpa -A -o json > diagnostics/hpa.json 2>/dev/null || true
          kubectl get deployments -A -o json > diagnostics/deployments.json
          kubectl get services -A -o json > diagnostics/services.json
          echo "Diagnostics gathered:"
          ls -la diagnostics/

      - name: Post work started comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.get-issue.outputs.issue_number }} \
            --body "🤖 **Cluster Doctor is on the case!**

          Diagnostics gathered. AI analysis in progress.

          🔗 [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - uses: actions/upload-artifact@v4
        with:
          name: cluster-diagnostics
          path: diagnostics/
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # Phase 2: AI agent analyzes diagnostics
  # Read-only permissions. No cloud creds. No GitHub write token.
  # Agent produces structured safe-outputs JSON.
  # ──────────────────────────────────────────────────────────
  analyze:
    needs: gather
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: cluster-diagnostics
          path: diagnostics/

      - name: Install GitHub Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash

      - name: AI analysis
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ needs.gather.outputs.issue_number }}"
          CLUSTER_NAME="${{ needs.gather.outputs.cluster_name }}"
          RG="${{ needs.gather.outputs.resource_group }}"

          cat > /tmp/analysis-prompt.md << PROMPT
          You are the Cluster Doctor analyzing AKS cluster "${CLUSTER_NAME}" in resource group "${RG}".

          Analyze the Kubernetes diagnostics in the diagnostics/ directory.
          The files contain JSON exports of cluster state: events, pods, nodes, HPAs, deployments, services, and resource metrics.

          Produce your findings as a JSON file at agent-output.json following this exact schema:

          {
            "version": "1",
            "actions": [
              {
                "type": "issue_comment",
                "issue_number": ${ISSUE_NUMBER},
                "body": "## Cluster Doctor Report\n\n<your full analysis in markdown>"
              }
            ]
          }

          Your analysis should include:
          - Cluster health summary (nodes, pods, resource pressure)
          - Any issues found (CrashLoopBackOff, OOMKilled, pending pods, etc.)
          - Root cause analysis where possible
          - Recommended remediation steps

          If you find issues that need code/config changes, add a create_pull_request action:
          {
            "type": "create_pull_request",
            "title": "[cluster-doctor] <description>",
            "body": "<what and why>",
            "head": "cluster-doctor/fix-<issue>",
            "files": { "path/to/file": "content" }
          }

          IMPORTANT:
          - Write ONLY the JSON file. No other output.
          - Do NOT include any secrets, tokens, or connection strings in your output.
          - Use the [cluster-doctor] prefix on all issue and PR titles.
          PROMPT

          copilot -p "$(cat /tmp/analysis-prompt.md)" \
            --agent "cluster-doctor"

          # Verify output exists and is valid JSON
          if [ ! -f agent-output.json ]; then
            echo "ERROR: Agent did not produce agent-output.json"
            exit 1
          fi
          python3 -c "import json; json.load(open('agent-output.json'))" || {
            echo "ERROR: agent-output.json is not valid JSON"
            exit 1
          }
          echo "Agent output:"
          cat agent-output.json | python3 -m json.tool

      - uses: actions/upload-artifact@v4
        with:
          name: agent-output
          path: agent-output.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # Phase 3: Validate, sanitize, and apply agent output
  # Has write permissions but NO AI agent running here.
  # ──────────────────────────────────────────────────────────
  apply:
    needs: [gather, analyze]
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agent-output

      - name: Install Copilot CLI (for threat detection)
        run: |
          curl -fsSL https://gh.io/copilot-install | bash

      - name: Safe Outputs Gate
        uses: microsoftgbb/safe-outputs-action@v1
        with:
          artifact-path: agent-output.json
          max-issues: 0
          max-comments: 2
          max-pull-requests: 1
          title-prefix: "[cluster-doctor] "
          allowed-labels: "cluster-doctor,bug,investigation,remediation"
          threat-detection: true
          custom-secret-patterns: |
            10\.0\.\d+\.\d+
            aks-[a-z0-9]{8,}
            DefaultEndpointsProtocol
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
