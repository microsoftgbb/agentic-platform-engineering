name: "Cluster Doctor (Safe Outputs)"

# Two-phase pattern with read-only agent access:
#   1. Diagnose - Agent has read-only K8s + Azure access via scoped RBAC,
#      plus read-only GitHub MCP. Produces safe-outputs JSON artifact.
#   2. Apply - Deterministic job validates, sanitizes, and applies the
#      agent's proposed actions via safe-outputs-action.
#
# The agent can freely explore the cluster (follow threads, check logs,
# inspect resources) but cannot mutate anything. All writes go through
# the gated apply phase.
#
# See: https://github.com/microsoftgbb/safe-outputs-action

on:
  workflow_dispatch:
  repository_dispatch:
    types: [cluster-doctor-trigger]
  issues:
    types: [labeled, opened]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # Phase 1: Diagnose
  #
  # The agent gets:
  #   - Read-only K8s access (scoped ClusterRole via AKS MCP server)
  #   - Read-only Azure access (OIDC, scoped to Monitoring Reader)
  #   - Read-only GitHub MCP (can read issues, not write them)
  #   - No GitHub write token
  #
  # The agent can follow threads freely - check pod logs when it
  # sees OOMKills, inspect HPA config when it sees scaling issues,
  # look at node allocatable when it sees pending pods, etc.
  #
  # Output: structured safe-outputs JSON artifact
  # ──────────────────────────────────────────────────────────
  diagnose:
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event_name == 'repository_dispatch' ||
      github.event.label.name == 'cluster-doctor' ||
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'cluster-doctor'))
    environment: copilot
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # Azure OIDC (scoped to read-only role)
      contents: read
      issues: read       # Read issues for context, not write
    outputs:
      issue_number: ${{ steps.get-issue.outputs.issue_number }}

    steps:
      - name: Determine issue number
        id: get-issue
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "issue_number=${{ github.event.client_payload.issue_number }}" >> $GITHUB_OUTPUT
          else
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install GitHub Copilot CLI
        run: |
          curl -fsSL https://gh.io/copilot-install | bash

      - name: Parse cluster info from issue body
        id: cluster-info
        env:
          GITHUB_MCP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          export ISSUE_NUMBER="${{ steps.get-issue.outputs.issue_number }}"
          export REPOSITORY="${{ github.repository }}"
          PROMPT=$(envsubst < .github/prompts/parse-cluster-info.md)

          COPILOT_OUTPUT=$(copilot -p "$PROMPT" \
            --agent "cluster-doctor" \
            --additional-mcp-config @'.copilot/mcp-config.json' \
            --allow-all-tools 2>&1)

          RESOURCE_GROUP=$(echo "$COPILOT_OUTPUT" | grep -oP 'RESOURCE_GROUP=\K[^\s]+' | head -1)
          CLUSTER_NAME=$(echo "$COPILOT_OUTPUT" | grep -oP 'CLUSTER_NAME=\K[^\s]+' | head -1)

          if [ -z "$RESOURCE_GROUP" ] || [ -z "$CLUSTER_NAME" ]; then
            echo "ERROR: Could not parse cluster info"
            echo "$COPILOT_OUTPUT"
            exit 1
          fi

          echo "RESOURCE_GROUP=$RESOURCE_GROUP" >> $GITHUB_OUTPUT
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> $GITHUB_OUTPUT

      # ── Establish read-only cluster access ──
      #
      # The Azure identity used here should be scoped to:
      #   - Azure Kubernetes Service Cluster User Role (read-only)
      #   - Monitoring Reader (for metrics)
      #
      # The AKS MCP server should use a K8s ClusterRole scoped to:
      #   - pods, events, nodes, services, deployments: get, list
      #   - pods/log: get
      #   - NO secrets, NO configmaps (or namespace-scoped)
      #   - NO create, update, delete, patch verbs
      #
      # See README for the recommended ClusterRole definition.

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Connect to AKS cluster
        run: |
          az aks install-cli
          az aks get-credentials \
            --resource-group ${{ steps.cluster-info.outputs.RESOURCE_GROUP }} \
            --name ${{ steps.cluster-info.outputs.CLUSTER_NAME }} \
            --overwrite-existing

          echo "Verifying cluster access..."
          kubectl cluster-info

          # Start port-forward to AKS MCP server
          # The MCP server provides read-only K8s access to the agent
          kubectl port-forward -n aks-mcp svc/aks-mcp 8000:8000 &
          sleep 3

      - name: Post work started comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.get-issue.outputs.issue_number }} \
            --body "🤖 **Cluster Doctor is on the case!**

          Connected to cluster. AI diagnosis in progress - the agent is
          exploring the cluster to identify and trace issues.

          🔗 [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      # ── Agent runs with read-only access ──
      #
      # The agent can freely:
      #   - Query any K8s resource via AKS MCP (read-only)
      #   - Read issue context via GitHub MCP (read-only)
      #   - Follow diagnostic threads (logs, events, resource chains)
      #
      # The agent CANNOT:
      #   - Write to GitHub (no write token provided)
      #   - Mutate K8s resources (read-only ClusterRole)
      #   - Access secrets (excluded from ClusterRole)
      #   - Reach external networks (if network policy is applied)

      - name: AI diagnosis
        env:
          GITHUB_MCP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.get-issue.outputs.issue_number }}"
          CLUSTER_NAME="${{ steps.cluster-info.outputs.CLUSTER_NAME }}"
          RG="${{ steps.cluster-info.outputs.RESOURCE_GROUP }}"

          export PROMPT="You are the Cluster Doctor diagnosing AKS cluster '${CLUSTER_NAME}' in resource group '${RG}'.

          Use the AKS MCP server to explore the cluster. You have read-only access to all Kubernetes resources.
          Use the GitHub MCP server to read issue #${ISSUE_NUMBER} in ${{ github.repository }} for context.

          INVESTIGATE FREELY:
          - Start broad (cluster health, node status, pod states)
          - Follow threads when you find issues (e.g., OOMKilled -> check resource limits -> check HPA -> check node capacity)
          - Check pod logs for crash details
          - Trace the dependency chain (service -> deployment -> pods -> events)
          - Look at recent events for warning patterns

          When your investigation is complete, produce your findings as a JSON file at agent-output.json following this schema:

          {
            \"version\": \"1\",
            \"actions\": [
              {
                \"type\": \"issue_comment\",
                \"issue_number\": ${ISSUE_NUMBER},
                \"body\": \"## Cluster Doctor Report\n\n<your full analysis in markdown>\"
              }
            ]
          }

          Your report should include:
          - Investigation path (what you checked and why)
          - Findings with evidence (specific pods, events, metrics)
          - Root cause analysis
          - Recommended remediation steps with specific commands or config changes

          If you identify config/code changes, add a create_pull_request action:
          {
            \"type\": \"create_pull_request\",
            \"title\": \"[cluster-doctor] <description>\",
            \"body\": \"<what changed and why>\",
            \"head\": \"cluster-doctor/fix-<issue>\",
            \"files\": { \"path/to/file\": \"full file content\" }
          }

          RULES:
          - Write ONLY the agent-output.json file. No other files.
          - Do NOT include secrets, tokens, connection strings, or internal IPs in your output.
          - Use [cluster-doctor] prefix on all titles."

          copilot -p "$PROMPT" \
            --agent "cluster-doctor" \
            --additional-mcp-config @'.copilot/mcp-config.json' \
            --allow-all-tools

          # Validate output
          if [ ! -f agent-output.json ]; then
            echo "ERROR: Agent did not produce agent-output.json"
            exit 1
          fi
          python3 -c "import json; json.load(open('agent-output.json'))" || {
            echo "ERROR: agent-output.json is not valid JSON"
            exit 1
          }
          echo "Agent output produced successfully"

      - uses: actions/upload-artifact@v4
        with:
          name: agent-output
          path: agent-output.json
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # Phase 2: Validate, sanitize, and apply
  #
  # No AI agent. No cluster access. No cloud creds.
  # Mechanically applies the validated, sanitized output.
  # ──────────────────────────────────────────────────────────
  apply:
    needs: diagnose
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agent-output

      - name: Install Copilot CLI (for threat detection)
        run: |
          curl -fsSL https://gh.io/copilot-install | bash

      - name: Safe Outputs Gate
        uses: microsoftgbb/safe-outputs-action@v1
        with:
          artifact-path: agent-output.json
          max-issues: 0
          max-comments: 2
          max-pull-requests: 1
          title-prefix: "[cluster-doctor] "
          allowed-labels: "cluster-doctor,bug,investigation,remediation"
          threat-detection: true
          custom-secret-patterns: |
            10\.0\.\d+\.\d+
            aks-[a-z0-9]{8,}
            DefaultEndpointsProtocol
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
